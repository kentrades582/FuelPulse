<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FuelPulse</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  body {
    background: #0b0b0d;
    color: white;
    display: flex;
    justify-content: center;
  }

  .container {
    max-width: 420px;
    width: 100%;
    padding: 24px;
  }

  .logo {
    text-align: center;
    margin-top: 40px;
  }

  .logo-icon {
    width: 64px;
    height: 64px;
    background: #ff6b00;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 28px;
  }

  .logo h1 {
    font-size: 32px;
    font-weight: 700;
  }

  .logo span {
    color: #ff6b00;
  }

  .headline {
    text-align: center;
    margin-top: 20px;
  }

  .headline h2 {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.2;
  }

  .headline p {
    color: #aaa;
    margin-top: 8px;
    font-size: 16px;
  }

  .card {
    background: #16161a;
    border-radius: 20px;
    padding: 20px;
    margin-top: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    animation: fadeIn 1s ease;
  }

  .card small {
    color: #888;
  }

  .status {
    font-size: 24px;
    font-weight: 700;
    margin-top: 10px;
    color: #ff6b00;
  }

  .confidence {
    margin-top: 10px;
    color: #aaa;
  }

  .social {
    margin-top: 24px;
    text-align: center;
    color: #ccc;
    font-size: 14px;
  }

  .cta {
    margin-top: 30px;
  }

  .btn-primary {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: #ff6b00;
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
  }

  .btn-primary:hover {
    transform: scale(1.03);
  }

  .btn-secondary {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    background: transparent;
    border: 1px solid #333;
    color: #aaa;
    border-radius: 12px;
  }

  .footer {
    text-align: center;
    font-size: 12px;
    color: #666;
    margin-top: 20px;
  }

  @keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
  }
</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <div class="logo-icon">⛽</div>
    <h1>Fuel<span>Pulse</span></h1>
  </div>

  <div class="headline">
    <h2>Know exactly when to fill up</h2>
    <p>Before prices go up.</p>
  </div>

  <div class="card">
    <small>CURRENT OUTLOOK</small>
    <div class="status">Fill Soon</div>
    <div>Prices likely rising in the next 24h</div>
    <div class="confidence">Confidence: 84%</div>
  </div>

  <div class="social">
    Cornwall drivers saved <strong>$3,400</strong> this month
  </div>

  <div class="cta">
    <button class="btn-primary">Create your account →</button>
    <button class="btn-secondary">Sign in</button>
  </div>

  <div class="footer">
    No spam. No tracking. Just smarter fuel decisions.
  </div>

</div>

</body>
</html>
